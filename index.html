<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Insta Liner - Fridge Combo</title>
    <link rel="apple-touch-icon" href="image_19.png">
    <link rel="icon" type="image/png" href="image_19.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --success: #2ecc71;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .fridge-container { width: 100%; max-width: 400px; text-align: center; }

        h1 { font-size: 2rem; margin-bottom: 5px; font-weight: 800; }
        .subtitle { color: #999; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 10px; }
        textarea {
            width: 100%;
            height: 200px;
            background: var(--input-bg);
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            padding: 15px;
            font-size: 1rem;
            color: var(--main);
            resize: none;
            outline: none;
            transition: border-color 0.3s ease;
        }
        textarea.working { border-color: var(--main); }

        .clear-btn {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: #999;
            cursor: pointer;
            margin-top: 5px;
            text-decoration: none;
        }

        /* 可視化バッジ */
        #statusMessage {
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            height: 20px;
            margin-bottom: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .button-group { margin: 10px 0 40px; }
        .main-btn {
            width: 100%;
            background: var(--main);
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .main-btn:active { transform: scale(0.98); }

        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 30px; }
        .kofi-btn, .home-btn {
            display: inline-flex;
            align-items: center;
            padding: 12px 20px;
            border-radius: var(--radius);
            font-weight: bold;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .kofi-btn { background: var(--main); color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); border: none; cursor: pointer; }

        footer { font-size: 0.75rem; color: #bbb; line-height: 1.6; }
        footer a { color: #bbb; text-decoration: underline; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: var(--radius); max-width: 300px; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; cursor: pointer; color: #aaa; }
    </style>
</head>
<body>

<div class="fridge-container">
    <h1>Insta Liner</h1>
    <p class="subtitle">Keep your caption layout perfect.</p>

    <div class="input-group">
        <textarea id="input" placeholder="Paste your draft here..."></textarea>
        <div id="clear" class="clear-btn">[ CLEAR ALL ]</div>
    </div>

    <div id="statusMessage"></div>

    <div class="button-group">
        <button class="main-btn" id="convertBtn">Convert & Copy</button>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">🍵 Support me on Ko-fi</a>
        <button class="home-btn" id="homeBtn">Add to Home Screen</button>
    </div>

    <footer>
        No login / No tracking / No ads / Browser only<br>
        <a href="#">Privacy Policy</a> / afrorakda © 2026
    </footer>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="close">&times;</span>
        <strong>📱 Install</strong><p>Add to home screen.<br>🍏 Safari: Share > Add to Home Screen<br>🤖 Chrome: Menu > Add to home screen</p>
    </div>
</div>

<script>
    const input = document.getElementById('input');
    const convertBtn = document.getElementById('convertBtn');
    const statusMsg = document.getElementById('statusMessage');
    const clearBtn = document.getElementById('clear');
    const modal = document.getElementById('modal');

    const INVISIBLE_CHAR = '⠀'; 

    convertBtn.addEventListener('click', () => {
        const lines = input.value.split('\n');
        let fixCount = 0;
        
        const processed = lines.map(line => {
            if (line.trim() === '') {
                fixCount++;
                return INVISIBLE_CHAR;
            }
            return line;
        }).join('\n');

        if (input.value) {
            navigator.clipboard.writeText(processed).then(() => {
                // 可視化演出
                statusMsg.textContent = `✨ ${fixCount} line breaks fixed!`;
                statusMsg.style.opacity = '1';
                input.classList.add('working');
                
                const originalText = convertBtn.textContent;
                convertBtn.textContent = 'Copied to Clipboard! ✓';
                
                setTimeout(() => {
                    convertBtn.textContent = originalText;
                    statusMsg.style.opacity = '0';
                    input.classList.remove('working');
                }, 2000);
            });
        }
    });

    clearBtn.addEventListener('click', () => {
        input.value = '';
        statusMsg.style.opacity = '0';
        input.focus();
    });

    document.getElementById('homeBtn').onclick = () => modal.style.display = 'flex';
    document.getElementById('close').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };
</script>

</body>
</html>
